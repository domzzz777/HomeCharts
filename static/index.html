<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeCharts — Real Estate Price Drops</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📉</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: #080e1a; color: #e2e8f0; min-height: 100vh; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    /* ── Header ─────────────────────────────────────────── */
    .header { background: linear-gradient(180deg, #0d1626 0%, #0b1120 100%); border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 50; backdrop-filter: blur(8px); }

    /* ── Stat cards ─────────────────────────────────────── */
    .stat-card { background: #101827; border: 1px solid #1e293b; border-radius: 12px; padding: 16px 20px; transition: border-color .2s; }
    .stat-card:hover { border-color: #334155; }
    .stat-number { font-size: 28px; font-weight: 700; line-height: 1; }
    .stat-label { font-size: 12px; color: #64748b; margin-top: 4px; text-transform: uppercase; letter-spacing: .05em; }

    /* ── Listing cards ──────────────────────────────────── */
    .listing-card { background: #101827; border: 1px solid #1e293b; border-radius: 14px; overflow: hidden; transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease; cursor: pointer; display: flex; flex-direction: column; }
    .listing-card:hover { transform: translateY(-3px); border-color: #3b82f6; box-shadow: 0 8px 32px rgba(59,130,246,.12); }

    /* ── Property image / carousel ───────────────────────── */
    .prop-img-wrap { position: relative; height: 190px; background: linear-gradient(135deg,#111827 0%,#1e293b 100%); overflow: hidden; flex-shrink: 0; }
    .prop-img-wrap img { width:100%; height:100%; object-fit:cover; transition: transform .3s ease; display:block; }
    .listing-card:hover .prop-img-wrap img { transform: scale(1.04); }
    .prop-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:52px; opacity:.18; }

    /* ── Card carousel nav dots ─────────────────────────── */
    .card-dots { position:absolute; bottom:8px; left:50%; transform:translateX(-50%); display:flex; gap:4px; }
    .card-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.4); transition: background .2s, transform .2s; }
    .card-dot.active { background:#fff; transform:scale(1.2); }

    /* ── Card carousel arrows ───────────────────────────── */
    .card-arrow { position:absolute; top:50%; transform:translateY(-50%); width:28px; height:28px; background:rgba(8,14,26,.65); border:none; color:#e2e8f0; border-radius:6px; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition: opacity .2s; z-index:2; }
    .prop-img-wrap:hover .card-arrow { opacity:1; }
    .card-arrow.prev { left:8px; }
    .card-arrow.next { right:8px; }

    /* ── Badges ─────────────────────────────────────────── */
    .drop-badge { position:absolute; top:10px; left:10px; background:rgba(239,68,68,.92); color:#fff; font-size:13px; font-weight:700; padding:4px 10px; border-radius:20px; letter-spacing:.02em; backdrop-filter:blur(4px); z-index:2; }
    .drop-badge.small { background:rgba(249,115,22,.90); }
    .photo-count-badge { position:absolute; bottom:8px; right:8px; background:rgba(8,14,26,.72); border:1px solid rgba(255,255,255,.12); color:#cbd5e1; font-size:11px; font-weight:500; padding:3px 8px; border-radius:6px; backdrop-filter:blur(4px); display:flex; align-items:center; gap:4px; z-index:2; }
    .portal-badge { position:absolute; top:10px; right:10px; background:rgba(15,23,42,.85); border:1px solid #334155; color:#94a3b8; font-size:10px; font-weight:600; padding:3px 8px; border-radius:6px; letter-spacing:.04em; text-transform:uppercase; backdrop-filter:blur(4px); z-index:2; }

    /* ── Card body ──────────────────────────────────────── */
    .card-body { padding:16px; flex:1; display:flex; flex-direction:column; gap:10px; }
    .price-row { display:flex; align-items:baseline; gap:10px; flex-wrap:wrap; }
    .price-current { font-size:22px; font-weight:700; color:#f1f5f9; }
    .price-original { font-size:14px; color:#64748b; text-decoration:line-through; }
    .card-title { font-size:14px; font-weight:500; color:#cbd5e1; line-height:1.4; }
    .card-title a { color:inherit; text-decoration:none; transition:color .15s; }
    .card-title a:hover { color:#60a5fa; text-decoration:underline; }
    .card-location { font-size:12px; color:#64748b; display:flex; align-items:center; gap:4px; }
    .card-specs { display:flex; gap:8px; flex-wrap:wrap; }
    .spec-chip { font-size:11px; color:#94a3b8; background:#1e293b; padding:3px 8px; border-radius:6px; white-space:nowrap; }
    .card-actions { margin-top:auto; display:flex; gap:8px; }
    .btn-history { flex:1; background:#1e293b; border:1px solid #334155; color:#94a3b8; font-size:12px; font-weight:500; padding:8px 10px; border-radius:8px; cursor:pointer; transition:background .15s,color .15s,border-color .15s; display:flex; align-items:center; justify-content:center; gap:5px; }
    .btn-history:hover { background:#3b82f6; border-color:#3b82f6; color:#fff; }
    .btn-ext-card { background:#1e293b; border:1px solid #334155; color:#64748b; font-size:12px; font-weight:500; padding:8px 10px; border-radius:8px; cursor:pointer; transition:background .15s,color .15s; display:flex; align-items:center; gap:4px; text-decoration:none; white-space:nowrap; }
    .btn-ext-card:hover { background:#334155; color:#e2e8f0; }
    .btn-whatsapp { display:flex; align-items:center; gap:4px; background:#1e293b; border:1px solid #25d366; color:#25d366; font-size:12px; font-weight:500; padding:8px 10px; border-radius:8px; text-decoration:none; white-space:nowrap; transition:background .15s,color .15s; }
    .btn-whatsapp:hover { background:#25d366; color:#fff; }
    .btn-whatsapp-modal { display:inline-flex; align-items:center; gap:6px; background:#1e293b; border:1px solid #25d366; color:#25d366; font-size:13px; font-weight:500; padding:8px 16px; border-radius:8px; text-decoration:none; transition:background .15s,color .15s; }
    .btn-whatsapp-modal:hover { background:#25d366; color:#fff; }

    /* ── Filters bar ────────────────────────────────────── */
    .filter-input { background:#1e293b; border:1px solid #334155; color:#e2e8f0; border-radius:8px; padding:8px 12px; font-size:13px; outline:none; transition:border-color .15s; }
    .filter-input:focus { border-color:#3b82f6; }
    .filter-input::placeholder { color:#475569; }
    select.filter-input option { background:#1e293b; }

    /* ── Modal overlay ──────────────────────────────────── */
    .modal-overlay { position:fixed; inset:0; z-index:100; background:rgba(5,10,20,.87); backdrop-filter:blur(6px); display:flex; align-items:center; justify-content:center; padding:16px; opacity:0; pointer-events:none; transition:opacity .2s; }
    .modal-overlay.open { opacity:1; pointer-events:auto; }
    .modal-box { background:#101827; border:1px solid #1e293b; border-radius:18px; max-width:820px; width:100%; max-height:92vh; overflow-y:auto; transform:translateY(16px); transition:transform .2s; }
    .modal-overlay.open .modal-box { transform:translateY(0); }

    /* ── Modal image gallery ────────────────────────────── */
    .gallery-wrap { position:relative; background:#0b1120; border-radius:14px 14px 0 0; overflow:hidden; }
    .gallery-main { position:relative; height:320px; overflow:hidden; }
    .gallery-main img { width:100%; height:100%; object-fit:cover; display:block; transition:opacity .25s; }
    .gallery-main .placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:72px; opacity:.12; background:linear-gradient(135deg,#111827,#1e293b); }
    .gallery-nav-btn { position:absolute; top:50%; transform:translateY(-50%); width:40px; height:40px; background:rgba(8,14,26,.75); border:1px solid rgba(255,255,255,.1); color:#e2e8f0; border-radius:10px; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s,border-color .15s; z-index:3; }
    .gallery-nav-btn:hover { background:rgba(59,130,246,.85); border-color:#3b82f6; }
    .gallery-nav-btn.prev { left:12px; }
    .gallery-nav-btn.next { right:12px; }
    .gallery-counter { position:absolute; bottom:12px; right:12px; background:rgba(8,14,26,.72); border:1px solid rgba(255,255,255,.1); color:#cbd5e1; font-size:12px; font-weight:500; padding:4px 10px; border-radius:6px; backdrop-filter:blur(4px); z-index:3; }
    /* Thumbnail strip */
    .gallery-thumbs { display:flex; gap:6px; padding:8px 12px; background:#0b1120; border-bottom:1px solid #1e293b; overflow-x:auto; scrollbar-width:thin; }
    .gallery-thumb { width:72px; height:52px; flex-shrink:0; border-radius:6px; overflow:hidden; cursor:pointer; border:2px solid transparent; transition:border-color .15s,transform .15s; }
    .gallery-thumb:hover { transform:scale(1.05); }
    .gallery-thumb.active { border-color:#3b82f6; }
    .gallery-thumb img { width:100%; height:100%; object-fit:cover; display:block; }

    /* ── Modal content ──────────────────────────────────── */
    .modal-header { display:flex; align-items:center; justify-content:space-between; padding:18px 24px 14px; border-bottom:1px solid #1e293b; }
    .modal-header h2 { font-size:17px; font-weight:600; color:#f1f5f9; line-height:1.3; }
    .btn-close { width:32px; height:32px; background:#1e293b; border:none; color:#64748b; border-radius:8px; font-size:18px; cursor:pointer; transition:background .15s,color .15s; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .btn-close:hover { background:#334155; color:#e2e8f0; }
    .modal-body { padding:20px 24px; }
    .modal-stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px; }
    .modal-stat { background:#1e293b; border-radius:10px; padding:12px 16px; text-align:center; }
    .modal-stat-value { font-size:20px; font-weight:700; }
    .modal-stat-label { font-size:11px; color:#64748b; margin-top:2px; text-transform:uppercase; letter-spacing:.05em; }
    .chart-container { position:relative; height:240px; }
    .history-table { width:100%; border-collapse:collapse; font-size:13px; }
    .history-table th { color:#64748b; font-weight:500; text-align:left; padding:6px 12px; border-bottom:1px solid #1e293b; }
    .history-table td { padding:8px 12px; border-bottom:1px solid #1a2435; color:#cbd5e1; }
    .history-table tr:last-child td { border-bottom:none; }
    .change-down { color:#f87171; font-weight:600; }
    .change-flat { color:#64748b; }
    .modal-footer { padding:16px 24px; border-top:1px solid #1e293b; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; }
    .btn-external { display:inline-flex; align-items:center; gap:6px; background:#1e293b; border:1px solid #334155; color:#94a3b8; font-size:13px; font-weight:500; padding:8px 16px; border-radius:8px; text-decoration:none; transition:background .15s,color .15s; }
    .btn-external:hover { background:#3b82f6; border-color:#3b82f6; color:#fff; }

    /* ── Market pills ───────────────────────────────────── */
    .market-pill { display:inline-flex; align-items:center; gap:6px; padding:6px 16px; border-radius:20px; font-size:13px; font-weight:500; border:1px solid; transition:all .15s; cursor:pointer; white-space:nowrap; }
    .market-pill.active { background:rgba(59,130,246,.15); border-color:#3b82f6; color:#60a5fa; }
    .market-pill.coming-soon { background:transparent; border-color:#1e293b; color:#475569; cursor:default; }
    .pill-arrow { font-size:10px; margin-left:2px; opacity:.7; transition:transform .15s; }
    .pill-arrow.open { transform:rotate(180deg); }
    /* ── Pill submenu ───────────────────────────────────── */
    .pill-group { position:relative; display:inline-flex; flex-direction:column; }
    .pill-submenu { position:absolute; top:calc(100% + 6px); left:0; background:#0d1626; border:1px solid #1e293b; border-radius:12px; padding:5px; z-index:200; min-width:130px; display:none; flex-direction:column; gap:2px; box-shadow:0 8px 24px rgba(0,0,0,.5); }
    .pill-submenu.open { display:flex; }
    .pill-sub-item { padding:7px 14px; font-size:12px; color:#94a3b8; border-radius:8px; cursor:pointer; white-space:nowrap; transition:all .12s; }
    .pill-sub-item:hover { background:#1e293b; color:#e2e8f0; }
    .pill-sub-item.active { background:rgba(59,130,246,.15); color:#60a5fa; }

    /* ── Misc ───────────────────────────────────────────── */
    .empty-state { text-align:center; padding:80px 24px; color:#475569; }
    .empty-state .icon { font-size:64px; margin-bottom:16px; }
    .empty-state h3 { font-size:18px; font-weight:600; color:#64748b; margin-bottom:8px; }
    .empty-state p { font-size:14px; line-height:1.6; }
    .skeleton { background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%); background-size:200% 100%; animation:shimmer 1.4s infinite; border-radius:8px; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .btn-scrape { display:inline-flex; align-items:center; gap:6px; background:rgba(59,130,246,.12); border:1px solid rgba(59,130,246,.3); color:#60a5fa; font-size:13px; font-weight:500; padding:7px 14px; border-radius:8px; cursor:pointer; transition:all .15s; }
    .btn-scrape:hover { background:rgba(59,130,246,.22); border-color:#3b82f6; }
    .btn-scrape.running { opacity:.6; pointer-events:none; }
    .btn-scrape .spin { animation:spin 1s linear infinite; display:inline-block; }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    input[type=range] { accent-color:#3b82f6; cursor:pointer; }
    .live-dot { width:8px; height:8px; border-radius:50%; background:#22c55e; box-shadow:0 0 0 0 rgba(34,197,94,.4); animation:pulse 2s infinite; display:inline-block; }
    @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(34,197,94,.4)} 70%{box-shadow:0 0 0 7px rgba(34,197,94,0)} 100%{box-shadow:0 0 0 0 rgba(34,197,94,0)} }
    .listings-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:20px; }
    .section-label { font-size:12px; color:#64748b; text-transform:uppercase; letter-spacing:.06em; font-weight:600; margin-bottom:10px; }
  /* ── Ticker ─────────────────────────────────────────────────────────────── */
  .ticker-wrap {
    width: 100%; overflow: hidden; background: #0a0f1a;
    border-bottom: 1px solid #1e293b;
    padding: 7px 0; position: relative; z-index: 200;
  }
  .ticker-track {
    display: flex; gap: 0; white-space: nowrap;
    animation: ticker-scroll 60s linear infinite;
    will-change: transform;
  }
  .ticker-track:hover { animation-play-state: paused; }
  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .ticker-item {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 500; color: #94a3b8;
    padding: 0 28px; cursor: pointer; transition: color .15s;
    text-decoration: none;
  }
  .ticker-item:hover { color: #f1f5f9; }
  .ticker-drop { color: #f87171; font-weight: 700; }
  .ticker-sep { color: #334155; }

  /* ── Mobile responsive ─────────────────────────────────────────────────── */
  @media (max-width: 640px) {
    /* Stat cards: 2×2 grid */
    .stats-grid-mobile { grid-template-columns: repeat(2, 1fr) !important; }
    .stat-card { padding: 12px 14px; }
    .stat-number { font-size: 22px; }
    .stat-label { font-size: 10px; }

    /* Filters: stack vertically */
    .filter-bar-mobile { flex-direction: column !important; gap: 8px !important; }
    .filter-input { width: 100% !important; }
    input[type=range] { width: 80px !important; }

    /* Listings grid: 1 column */
    .listings-grid { grid-template-columns: 1fr !important; }

    /* Modal */
    .modal-overlay { padding: 8px !important; align-items: flex-end !important; }
    .modal-box { border-radius: 18px 18px 0 0 !important; max-height: 96vh; }
    .gallery-main { height: 220px !important; }
    .modal-body { padding: 14px 16px !important; }
    .modal-header { padding: 14px 16px !important; }
    .modal-stats-row { grid-template-columns: repeat(3, 1fr) !important; gap: 8px !important; }
    .modal-stat-value { font-size: 16px !important; }
    .modal-footer { flex-direction: column !important; }

    /* Header nav: hide subtitle, keep controls */
    .header-nav-text { display: none !important; }

    /* Mobile: hide desktop pills row + dropdowns */
    #header-pills-row { display: none !important; }
    .pill-submenu { display: none !important; }
    #mobile-city-bar { display: none !important; }

    /* Mobile selector: always show two-column panel */
    #mobile-selector { display: flex !important; }

    /* Card carousel arrows: always visible on touch devices */
    .prop-img-wrap .card-arrow { opacity: 0.55 !important; }

    /* Gallery nav arrows: always visible */
    .gallery-nav-btn { opacity: 1 !important; }
  }

  /* Touch devices: always show arrows subtly */
  @media (hover: none) {
    .prop-img-wrap .card-arrow { opacity: 0.5 !important; }
    .gallery-nav-btn { opacity: 1 !important; }
  }

  /* ── Mobile selector ───────────────────────────────────────────────────── */
  .mob-country-btn {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 11px 12px;
    background: none; border: none; border-bottom: 1px solid #0d1626;
    color: #94a3b8; font-size: 13px; font-weight: 500;
    cursor: pointer; text-align: left; font-family: inherit;
    transition: background .12s, color .12s;
    white-space: nowrap;
  }
  .mob-country-btn.active {
    background: rgba(59,130,246,.12);
    color: #60a5fa;
    border-right: 2px solid #3b82f6;
  }
  .mob-city-btn {
    display: flex; align-items: center; gap: 7px;
    width: 100%; padding: 9px 10px; margin-bottom: 4px;
    background: #111827; border: 1px solid #1e293b; border-radius: 10px;
    color: #94a3b8; font-size: 13px; font-weight: 500;
    cursor: pointer; text-align: left; font-family: inherit;
    transition: background .12s, border-color .12s, color .12s;
  }
  .mob-city-btn.active {
    background: rgba(59,130,246,.15);
    border-color: #3b82f6;
    color: #60a5fa;
  }
  .mob-city-btn:active, .mob-country-btn:active { opacity: .7; }
  </style>
</head>
<body>

<!-- ── TICKER ─────────────────────────────────────────────────────────────── -->
<div class="ticker-wrap" id="ticker-wrap">
  <div class="ticker-track" id="ticker-track">
    <span style="color:#475569;font-size:12px;padding:0 16px;">Loading…</span>
  </div>
</div>

<!-- ── HEADER ──────────────────────────────────────────────────────────────── -->
<header class="header">
  <!-- Row 1: logo + right controls -->
  <div style="max-width:1400px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;">
    <a href="/" style="display:flex;align-items:center;gap:0;text-decoration:none;flex-shrink:0;">
      <img src="/static/logo.png" alt="HomeCharts logo" style="width:52px;height:52px;object-fit:contain;mix-blend-mode:screen;flex-shrink:0;">
      <div style="display:flex;flex-direction:column;justify-content:center;margin-left:4px;">
        <div style="font-size:18px;font-weight:900;color:#f1f5f9;letter-spacing:-.03em;font-family:'Inter',system-ui,sans-serif;line-height:1.1;">Home<span style="color:#ef4444;">Charts</span></div>
        <div class="header-nav-text" style="font-size:10px;color:#475569;margin-top:1px;font-family:'Inter',system-ui,sans-serif;">Real estate price drop tracker</div>
      </div>
    </a>
    <!-- Pills are rendered in #header-pills-row below by buildPillsRow() -->
    <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
      <span class="header-nav-text" style="font-size:12px;color:#475569;display:flex;align-items:center;gap:6px;">
        <span class="live-dot"></span>
        <span id="last-updated-text">Loading…</span>
      </span>
      <!-- Language switcher -->
      <div style="position:relative;display:inline-block;" id="dash-lang-switcher">
        <button onclick="toggleDashLangMenu()" style="display:flex;align-items:center;gap:5px;background:#0d1626;border:1px solid #334155;color:#94a3b8;font-size:12px;font-weight:500;padding:6px 11px;border-radius:8px;cursor:pointer;font-family:inherit;transition:border-color .15s;">
          <span id="dash-lang-flag">🇬🇧</span>
          <span id="dash-lang-code">EN</span>
          <svg width="9" height="9" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="opacity:.5;"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/></svg>
        </button>
        <div id="dash-lang-menu" style="display:none;position:absolute;right:0;top:calc(100% + 6px);background:#0d1626;border:1px solid #1e293b;border-radius:10px;overflow:hidden;min-width:120px;z-index:999;box-shadow:0 8px 24px rgba(0,0,0,.4);">

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let allListings      = [];
let filteredListings = [];
let currentListing   = null;
let priceChart       = null;
let galleryImages    = [];
let galleryIndex     = 0;

// ─── All pills/countries definition ───────────────────────────────────────────
const ALL_PILLS = [
  { country: 'Georgia',    flag: '🇬🇪' },
  { country: 'Albania',    flag: '🇦🇱' },
  { country: 'Malta',      flag: '🇲🇹' },
  { country: 'Greece',     flag: '🇬🇷' },
  { country: 'Spain',      flag: '🇪🇸' },
  { country: 'Montenegro', flag: '🇲🇪' },
  { country: 'Portugal',   flag: '🇵🇹' },
  { country: 'Cyprus',     flag: '🇨🇾' },
];

// ─── Build desktop pills row ───────────────────────────────────────────────────
function buildPillsRow() {
  const row = id('header-pills-row');
  if (!row) return;
  row.innerHTML = ALL_PILLS.map(({ country, flag }) => {
    const cities = PILL_CITIES[country] || [];
    const hasSub = cities.length > 0;
    const arrow  = hasSub ? `<span class="pill-arrow" id="arrow-${country}">▾</span>` : '';
    const submenu = hasSub ? `
      <div class="pill-submenu" id="submenu-${country}">
        ${cities.map(([e, c]) => `<div class="pill-sub-item" onclick="setPillCity('${country}','${c.replace(/'/g,"\\'")}')">  ${e} ${c}</div>`).join('')}
      </div>` : '';
    return `
      <div class="pill-group" id="group-${country}">
        <div class="market-pill" id="pill-${country}" onclick="togglePillGroup('${country}')">
          <span style="font-size:15px;">${flag}</span> ${country} ${arrow}
        </div>
        ${submenu}
      </div>`;
  }).join('');
}

// ─── Build mobile two-column selector ─────────────────────────────────────────
let _mobSelectedCountry = '';

function buildMobileSelector() {
  const countryCol = id('mob-countries');
  const cityCol    = id('mob-cities');
  if (!countryCol || !cityCol) return;

  countryCol.innerHTML = ALL_PILLS.map(({ country, flag }) => `
    <button class="mob-country-btn${_mobSelectedCountry === country ? ' active' : ''}"
      onclick="mobSelectCountry('${country}')">
      ${flag} ${country}
    </button>`).join('');

  _renderMobCities(cityCol);
}

function _renderMobCities(cityCol) {
  cityCol = cityCol || id('mob-cities');
  const cities = PILL_CITIES[_mobSelectedCountry] || [];
  if (!_mobSelectedCountry) {
    cityCol.innerHTML = '<p style="color:#334155;font-size:12px;padding:14px 8px;text-align:center;">← tap a country</p>';
    return;
  }
  if (!cities.length) {
    cityCol.innerHTML = `<button class="mob-city-btn active" onclick="mobSelectCountry('${_mobSelectedCountry}')">All ${_mobSelectedCountry}</button>`;
    return;
  }
  cityCol.innerHTML =
    `<button class="mob-city-btn${!activePillCity ? ' active' : ''}"
       onclick="mobSetCity('')">All cities</button>` +
    cities.map(([e, c]) =>
      `<button class="mob-city-btn${activePillCity === c ? ' active' : ''}"
         onclick="mobSetCity('${c.replace(/'/g,"\\'")}')">
         ${e} ${c}
       </button>`
    ).join('');
}

function mobSelectCountry(country) {
  _mobSelectedCountry = country;
  activePillCity = '';
  id('country-select').value = country;
  // Update active state on country buttons
  document.querySelectorAll('.mob-country-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(country));
  });
  _renderMobCities();
  applyFilters();
  updateMarketPills();
}

function mobSetCity(city) {
  activePillCity = city;
  if (city) {
    id('country-select').value = _mobSelectedCountry;
  }
  _renderMobCities();
  applyFilters();
  updateMarketPills();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildPillsRow();
  buildMobileSelector();
  showSkeletons(9);
  loadAll();
  setInterval(loadAll, 60_000);
  loadTicker();
  setInterval(loadTicker, 3 * 60_000); // refresh ticker every 3 min
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft')  shiftGallery(-1);
    if (e.key === 'ArrowRight') shiftGallery(1);
  });
  // Restore saved currency preference
  setCurrency(activeCurrency);

  // Pre-apply country filter from URL param (?country=Albania etc.)
  const urlCountry = new URLSearchParams(window.location.search).get('country');
  if (urlCountry) {
    const sel = id('country-select');
    if (sel) sel.value = urlCountry;

    // highlight pill + open submenu
    const pill    = id(`pill-${urlCountry}`);
    const submenu = id(`submenu-${urlCountry}`);
    const arrow   = id(`arrow-${urlCountry}`);
    if (pill)    pill.classList.add('active');
    if (submenu) submenu.classList.add('open');
    if (arrow)   arrow.classList.add('open');

    // apply filter once listings have loaded
    const _applyWhenReady = setInterval(() => {
      if (document.querySelectorAll('.listing-card').length > 0 ||
          document.getElementById('empty-state')) {
        clearInterval(_applyWhenReady);
        applyFilters();
        updateMarketPills();
      }
    }, 100);
    // safety fallback
    setTimeout(() => { clearInterval(_applyWhenReady); applyFilters(); updateMarketPills(); }, 4000);
  }
});

async function loadAll() {
  await Promise.all([loadStats(), loadListings()]);
}

// ─── Ticker ───────────────────────────────────────────────────────────────────
const COUNTRY_FLAG_MAP = { Georgia:'🇬🇪', Albania:'🇦🇱', Malta:'🇲🇹', Greece:'🇬🇷', Spain:'🇪🇸', Montenegro:'🇲🇪', Portugal:'🇵🇹', Cyprus:'🇨🇾' };

async function loadTicker() {
  try {
    const items = await fetch('/api/ticker').then(r => r.json());
    if (!items || !items.length) return;

    const EUR_RATE = 0.92;
    const flag = c => COUNTRY_FLAG_MAP[c] || '';

    const makeItem = it => {
      const f = flag(it.country);
      const abs = Math.abs(it.drop_pct);
      const c = abs >= 20 ? '#ef4444' : '#f59e0b';
      return `<a class="ticker-item" href="${it.url}" target="_blank" rel="noopener">
        ${f ? `<span>${f}</span>` : ''}
        <span>${it.label}</span>
        <span style="color:${c};font-weight:700;">−${abs.toFixed(1)}%</span>
        <span style="color:#475569">·</span>
        <span style="color:#64748b">${it.ago}</span>
      </a><span class="ticker-sep">⬥</span>`;
    };

    const html = items.map(makeItem).join('');
    // Duplicate for seamless loop
    const track = document.getElementById('ticker-track');
    track.innerHTML = html + html;

    // Adjust animation speed: ~100px per second, so duration ≈ total_width / 100
    // We approximate: each item ~220px wide
    const totalW = items.length * 220;
    track.style.animationDuration = Math.max(20, totalW / 80) + 's';
  } catch (e) {
    console.warn('Ticker load failed', e);
  }
}

// ─── Stats ────────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const d = await fetch('/api/stats').then(r => r.json());
    set('stat-total',   d.total_tracked.toLocaleString());
    set('stat-drops',   d.active_drops.toLocaleString());
    set('stat-biggest', d.biggest_drop_pct ? `↓ ${Math.abs(d.biggest_drop_pct).toFixed(1)}%` : '—');
    set('stat-avg',     d.avg_drop_pct     ? `↓ ${Math.abs(d.avg_drop_pct).toFixed(1)}%`     : '—');
    set('last-updated-text', d.last_updated ? `Updated ${timeAgo(new Date(d.last_updated))}` : 'No scrape yet');
  } catch(e) { console.error('Stats:', e); }
}

// ─── Listings ─────────────────────────────────────────────────────────────────
async function loadListings() {
  try {
    allListings = await fetch('/api/listings?sort=drop').then(r => r.json());
    applyFilters();
  } catch(e) {
    showError(); console.error('Listings:', e);
  }
}

// City matching for pill sub-filter (handles accent variants + area grouping)
const _CITY_PATTERNS = {

  'StJulians': /^(st\.?\s*julian['']?s?|san\s*[ġg]iljan|spinola|paceville|swieqi|pembroke)$/i,
  // Albania

function _cityMatches(listingCity, filterCity) {
  const pat = _CITY_PATTERNS[filterCity];
  return pat ? pat.test((listingCity || '').trim()) : false;
}

// Albania always restricted to Tirana + Durres area
const _ALBANIA_SHOWN = /^(tiran[aë]|durrë?s|durres)$/i;

function applyFilters() {
  const search       = id('search-input').value.toLowerCase().trim();
  const sort         = id('sort-select').value;
  const portal       = id('portal-select').value;
  const country      = id('country-select').value;
  const minDrop      = parseFloat(id('min-drop-slider').value) || 0;
  const maxDrop      = parseFloat(id('max-drop-slider').value) || 50;
  const maxPriceRaw  = parseFloat(id('max-price-input').value) || 0;
  const maxPriceCur  = activeCurrency;   // follows the USD/EUR toggle

  const LIVE_MARKETS = ['Georgia', 'Albania', 'Malta', 'Greece', 'Spain'];

  let filtered = allListings.filter(l => {
    // Without explicit country filter show only live markets
    if (!country && !LIVE_MARKETS.includes(l.country)) return false;
    if (country && l.country !== country) return false;
    // Albania always restricted to Tirana + Durres
    if (l.country === 'Albania' && !_ALBANIA_SHOWN.test((l.city || '').trim())) return false;
    // City sub-filter from expandable pill
    if (activePillCity && !_cityMatches(l.city, activePillCity)) return false;
    if (portal && l.portal !== portal) return false;
    // minDrop=0 → show all (including no-drop); minDrop>0 → must have a real drop >= minDrop%
    if (minDrop === 0) { /* show all */ }
    else if (l.drop_pct == null || l.drop_pct >= 0 || l.drop_pct > -minDrop) return false;
    if (maxDrop < 50 && l.drop_pct < -maxDrop) return false;
    // Max price filter — convert listing price to the filter's chosen currency
    if (maxPriceRaw > 0 && l.price != null) {
      const priceInFilterCur = convertTo(l.price, l.currency || 'USD', maxPriceCur);
      if (priceInFilterCur != null && priceInFilterCur > maxPriceRaw) return false;
    }
    if (search) {
      const hay = `${l.title||''} ${l.neighborhood||''} ${l.city||''} ${l.country||''}`.toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  const sortFns = {
    drop:       (a,b) => a.drop_pct - b.drop_pct,
    latest:     (a,b) => (b.last_seen_at||'').localeCompare(a.last_seen_at||''),
    price_asc:  (a,b) => (a.price||0) - (b.price||0),
    price_desc: (a,b) => (b.price||0) - (a.price||0),
    area:       (a,b) => (b.area_sqm||0) - (a.area_sqm||0),
  };
  filtered.sort(sortFns[sort] || sortFns.drop);

  const _t = DASH_T[_dashLang] || DASH_T.en;
  id('result-count').textContent = _t.listing_count(filtered.length, allListings.length);

  filteredListings = filtered;
  updateMarketPills();
  renderListings(filtered);
}

function renderListings(listings) {
  const grid = id('listings-grid');
  if (!listings.length) {
    const _t = DASH_T[_dashLang] || DASH_T.en;
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">🏠</div><h3>${_t.no_listings}</h3><p>${_t.no_listings_hint}</p></div>`;
    return;
  }
  grid.innerHTML = listings.map(renderCard).join('');
  requestAnimationFrame(setupCardSwipes);
}

  if (!url) return url;
  if (url.includes('tranio.com/photos/')) return `/api/proxy-image?url=${encodeURIComponent(url)}`;

}

// ─── Touch swipe helper ────────────────────────────────────────────────────────
function enableSwipe(el, onLeft, onRight) {
  let startX = null, startY = null, moved = false;
  el.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    moved = false;
  }, { passive: true });
  el.addEventListener('touchmove', e => {
    if (startX === null) return;
    const dx = e.touches[0].clientX - startX;
    const dy = e.touches[0].clientY - startY;
    if (Math.abs(dx) > Math.abs(dy) + 5) moved = true;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (startX === null || !moved) { startX = null; return; }
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) {
      dx < 0 ? onLeft() : onRight();
      e.preventDefault();
    }
    startX = null; moved = false;
  }, { passive: false });
}

// ─── Card mini-carousel ───────────────────────────────────────────────────────
const _cardIndices = {};
const _cardImages  = {};  // cache per listing id

function _setCardImage(listingId, imgs, index) {
  const imgEl  = document.getElementById(`card-img-${listingId}`);
  const dots   = document.getElementById(`card-dots-${listingId}`);
  if (!imgEl) return;
  const i = (index + imgs.length) % imgs.length;
  _cardIndices[listingId] = i;
  _cardImages[listingId]  = imgs;
  imgEl.src = imgs[i];
  if (dots) {
    dots.querySelectorAll('.card-dot').forEach((d,j) => d.classList.toggle('active', j === i));
  }
}

function cardPrev(e, id, imgs) {
  e.stopPropagation();
  _setCardImage(id, imgs, (_cardIndices[id] ?? 0) - 1);
}
function cardNext(e, id, imgs) {
  e.stopPropagation();
  _setCardImage(id, imgs, (_cardIndices[id] ?? 0) + 1);
}

function setupCardSwipes() {
  document.querySelectorAll('.prop-img-wrap[data-lid]').forEach(wrap => {
    const lid  = parseInt(wrap.dataset.lid);
    const imgs = _cardImages[lid];
    if (!imgs || imgs.length < 2) return;
    if (wrap._swipeEnabled) return;
    wrap._swipeEnabled = true;
    enableSwipe(
      wrap,
      () => _setCardImage(lid, imgs, (_cardIndices[lid] ?? 0) + 1),
      () => _setCardImage(lid, imgs, (_cardIndices[lid] ?? 0) - 1)
    );
  });
}

// ─── Modal ────────────────────────────────────────────────────────────────────
function openModal(listingIdOrObj) {
  const l = (typeof listingIdOrObj === 'object')
    ? listingIdOrObj
    : allListings.find(x => x.id === listingIdOrObj);
  if (!l) return;
  currentListing = l;

  // Gallery
  galleryImages = (l.images || (l.image_url ? [l.image_url] : [])).map(proxyImg);
  galleryIndex  = 0;
  renderModalGallery();

  // Stats
  set('modal-title',         l.title || 'Property Details');
  set('modal-price-current', fmtPrice(l.price,     l.currency));
  set('modal-price-peak',    fmtPrice(l.max_price,  l.currency));
  set('modal-drop',          l.drop_pct < -.5 ? `↓ ${Math.abs(l.drop_pct).toFixed(1)}%` : 'No drop');

  // Detail chips
  const chips = [
    l.rooms                     ? `🛏 ${l.rooms} room${l.rooms!==1?'s':''}` : null,
    l.area_sqm                  ? `📐 ${l.area_sqm} m²`                     : null,
    l.floor && l.total_floors   ? `🏢 Floor ${l.floor} / ${l.total_floors}` : null,
    l.neighborhood              ? `📍 ${l.neighborhood}`                     : null,
  ].filter(Boolean);
  id('modal-details').innerHTML = chips.map(c => `<span class="spec-chip" style="font-size:12px;padding:4px 10px;">${esc(c)}</span>`).join('');

  // Chart
  if (priceChart) { priceChart.destroy(); priceChart = null; }
  const history = l.history || [];

  // Single price point — show "just started tracking" placeholder
  const chartWrap = id('price-chart').parentElement;
  if (history.length < 2) {
    const p0 = history[0];
    chartWrap.innerHTML = `<div style="height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;border:1px dashed #1e293b;border-radius:12px;">
      <div style="font-size:32px;">📡</div>
      <div style="font-size:14px;font-weight:600;color:#cbd5e1;">Tracking started</div>
      <div style="font-size:13px;color:#475569;text-align:center;max-width:280px;line-height:1.6;">
        First price recorded: <strong style="color:#f1f5f9;">${p0 ? fmtPrice(p0.price, p0.currency) : '—'}</strong><br/>
        Price history will appear after the next daily scan.
      </div>
    </div>`;
  } else {
    // restore canvas if we replaced it before
    if (!id('price-chart')) {
      chartWrap.innerHTML = '<canvas id="price-chart"></canvas>';
    }
    const ctx = id('price-chart').getContext('2d');
    priceChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels:   history.map(h => fmtDate(new Date(h.recorded_at))),
        datasets: [{
          label: `Price (${activeCurrency})`,
          data:  history.map(h => convertPrice(h.price)),
          borderColor:       '#3b82f6',
          backgroundColor:   'rgba(59,130,246,.08)',
          pointBackgroundColor: '#3b82f6',
          pointRadius: 5, pointHoverRadius: 7,
          tension: 0.3, fill: true, borderWidth: 2,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1e293b', borderColor: '#334155', borderWidth: 1,
            titleColor: '#94a3b8', bodyColor: '#f1f5f9',
            callbacks: { label: ctx => ` ${fmtPrice(ctx.parsed.y, l.currency)}` },
          },
        },
        scales: {
          y: { grid: { color: '#1a2435' }, ticks: { color: '#64748b', callback: v => { const sym = activeCurrency==='EUR'?'€':'$'; return sym+(convertPrice(v)/1000).toFixed(0)+'k'; } } },
          x: { grid: { color: '#1a2435' }, ticks: { color: '#64748b', maxRotation: 30 } },
        },
      },
    });
  } // end else (history.length >= 2)

  // History table
  id('modal-history-rows').innerHTML = [...history].reverse().map((h, i) => {
    const chg = h.change_pct;
    const chgStr = chg < -.1
      ? `<span class="change-down">↓ ${Math.abs(chg).toFixed(1)}%</span>`
      : `<span class="change-flat">—</span>`;
    return `<tr>
      <td>${fmtDate(new Date(h.recorded_at))}</td>
      <td><strong>${fmtPrice(h.price, h.currency)}</strong></td>
      <td>${i === history.length - 1 ? `<span class="change-flat">${(DASH_T[_dashLang]||DASH_T.en).first_seen_label}</span>` : chgStr}</td>
    </tr>`;
  }).join('');

  // Footer
  const extLink = id('modal-ext-link');
  extLink.href = l.url || '#';
  extLink.textContent = `${(DASH_T[_dashLang]||DASH_T.en).view_on} ${l.portal} ↗`;

  const waBtn = id('modal-whatsapp');
  if (l.phone) {
    waBtn.href = `https://wa.me/${l.phone}`;
    waBtn.style.display = 'inline-flex';
  } else {
    waBtn.style.display = 'none';
  }

  const _tm = DASH_T[_dashLang] || DASH_T.en;
  id('modal-meta').textContent =
    `${_tm.first_seen} ${fmtDate(new Date(l.first_seen_at))} · ${history.length} price point${history.length!==1?'s':''}`;

  id('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

// ─── Modal gallery ────────────────────────────────────────────────────────────
function renderModalGallery() {
  const wrap = id('modal-gallery');
  if (!galleryImages.length) {
    wrap.innerHTML = '';
    return;
  }

  const thumbs = galleryImages.map((src, i) => `
    <div class="gallery-thumb${i===0?' active':''}" id="gthumb-${i}" onclick="setGalleryImage(${i})">
      <img src="${esc(src)}" alt="" loading="lazy" />
    </div>`).join('');

  const navBtns = galleryImages.length > 1 ? `
    <button class="gallery-nav-btn prev" onclick="shiftGallery(-1)">‹</button>
    <button class="gallery-nav-btn next" onclick="shiftGallery(1)">›</button>
    <span class="gallery-counter" id="gallery-counter">1 / ${galleryImages.length}</span>` : '';

  wrap.innerHTML = `
    <div class="gallery-wrap">
      <div class="gallery-main" id="gallery-main">
        <img id="gallery-main-img" src="${esc(galleryImages[0])}" alt=""
             onerror="this.style.display='none';document.getElementById('gallery-ph').style.display='flex';" />
        <div class="placeholder" id="gallery-ph" style="display:none;">🏢</div>
        ${navBtns}
      </div>
      ${galleryImages.length > 1 ? `<div class="gallery-thumbs" id="gallery-thumbs">${thumbs}</div>` : ''}
    </div>`;

  // Enable touch swipe on modal gallery
  if (galleryImages.length > 1) {
    const mainEl = id('gallery-main');
    if (mainEl && !mainEl._swipeEnabled) {
      mainEl._swipeEnabled = true;
      enableSwipe(mainEl, () => shiftGallery(1), () => shiftGallery(-1));
    }
  }
}

function setGalleryImage(i) {
  const imgs = galleryImages;
  if (!imgs.length) return;
  galleryIndex = (i + imgs.length) % imgs.length;

  const mainImg = id('gallery-main-img');
  if (mainImg) { mainImg.style.opacity = '0'; }
  setTimeout(() => {
    if (mainImg) { mainImg.src = imgs[galleryIndex]; mainImg.style.opacity = '1'; mainImg.style.display = ''; }
    const ph = id('gallery-ph');
    if (ph) ph.style.display = 'none';
    const counter = id('gallery-counter');
    if (counter) counter.textContent = `${galleryIndex+1} / ${imgs.length}`;
    // Update active thumb
    for (let j = 0; j < imgs.length; j++) {
      const t = id(`gthumb-${j}`);
      if (t) t.classList.toggle('active', j === galleryIndex);
    }
    // Scroll thumb into view
    const activeThumb = id(`gthumb-${galleryIndex}`);
    if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }, 120);
}

function shiftGallery(dir) {
  if (galleryImages.length < 2) return;
  setGalleryImage(galleryIndex + dir);
}

function closeModal() {
  id('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  if (priceChart) { priceChart.destroy(); priceChart = null; }
  currentListing = null;
}

function handleOverlayClick(e) {
  if (e.target === id('modal-overlay')) closeModal();
}

// ─── Scrape trigger ───────────────────────────────────────────────────────────
async function triggerScrape() {
  const btn = id('btn-scrape');
  const icon = id('scrape-icon');
  btn.classList.add('running');
  icon.innerHTML = '<span class="spin">⟳</span>';
  try {
    await fetch('/api/scrape', { method: 'POST' });
    await new Promise(r => setTimeout(r, 3000));
    await loadAll();
  } catch(e) { console.error(e); }
  finally { btn.classList.remove('running'); icon.textContent = '⟳'; }
}

// Active city sub-filter set by pill submenu ('' = no city filter)
let activePillCity = '';

// City options per country
const PILL_CITIES = {
  Georgia:  [['🏖','Batumi']],
  Albania:  [['🏙','Tirana'],['🏖','Durrës']],
  Malta:    [['🏝','Gozo'],['🏛','Valletta'],['🌊','Sliema'],['🎰','St Julian\'s']],
  Spain:    [['☀️','Costa del Sol'],['🏖','Costa Blanca'],['🏙','Barcelona'],['🌋','Tenerife'],['⛵','Mallorca'],['🏛','Madrid']],
  Greece:   [['🏛','Athens'],['🏝','Crete'],['🌋','Santorini'],['⛵','Mykonos'],['🏝','Paros'],['🫒','Corfu'],['🌲','Halkidiki'],['🏛','Peloponnese']],
};
const ALL_COUNTRIES = ['Georgia','Albania','Malta','Greece','Spain','Montenegro','Portugal','Cyprus'];

function _isMobile() { return window.innerWidth <= 640; }

function _closePillMenus(except) {
  ALL_COUNTRIES.forEach(c => {
    if (c === except) return;
    const sm = id(`submenu-${c}`);
    const ar = id(`arrow-${c}`);
    if (sm) sm.classList.remove('open');
    if (ar) ar.classList.remove('open');
  });
}

function _hideMobileCityBar() {
  const bar = id('mobile-city-bar');
  if (bar) bar.setAttribute('data-hidden', 'true');
}

function _showMobileCityBar(country) {
  const bar   = id('mobile-city-bar');
  const chips = id('mobile-city-chips');
  if (!bar || !chips) return;
  const cities = PILL_CITIES[country] || [];
  if (!cities.length) { _hideMobileCityBar(); return; }

  chips.innerHTML =
    `<button class="mobile-city-chip-close" onclick="_hideMobileCityBar();id('country-select').value='';activePillCity='';applyFilters();updateMarketPills();">✕ ${country}</button>` +
    cities.map(([emoji, city]) =>
      `<button class="mobile-city-chip${activePillCity===city?' active':''}"
        onclick="setPillCity('${country}','${city.replace(/'/g,"\\'")}')">${emoji} ${city}</button>`
    ).join('');
  bar.removeAttribute('data-hidden');
}

function togglePillGroup(country) {
  const submenu = id(`submenu-${country}`);
  const arrow   = id(`arrow-${country}`);
  const cities  = PILL_CITIES[country] || [];

  if (_isMobile()) {
    // Mobile: use the city bar below header
    const sel     = id('country-select');
    const wasOpen = sel.value === country && !id('mobile-city-bar').getAttribute('data-hidden');
    activePillCity = '';
    if (wasOpen) {
      sel.value = '';
      _hideMobileCityBar();
    } else {
      sel.value = country;
      if (cities.length) _showMobileCityBar(country);
      else _hideMobileCityBar();
    }
    applyFilters();
    updateMarketPills();
    return;
  }

  // Desktop: standard dropdown
  if (!submenu || !cities.length) { setMarketFilter(country); return; }
  const isOpen = submenu.classList.contains('open');
  _closePillMenus(country);
  activePillCity = '';
  if (isOpen) {
    submenu.classList.remove('open');
    if (arrow) arrow.classList.remove('open');
    if (id('country-select').value === country) id('country-select').value = '';
  } else {
    submenu.classList.add('open');
    if (arrow) arrow.classList.add('open');
    id('country-select').value = country;
  }
  applyFilters();
  updateMarketPills();
}

function setPillCity(country, city) {
  if (id('country-select').value === country && activePillCity === city) {
    activePillCity = '';
  } else {
    id('country-select').value = country;
    activePillCity = city;
  }
  applyFilters();
  updateMarketPills();
  if (_isMobile()) _showMobileCityBar(country);
}

function setMarketFilter(country) {
  _closePillMenus(null);
  activePillCity = '';
  _hideMobileCityBar();
  const sel = id('country-select');
  sel.value = sel.value === country ? '' : country;
  applyFilters();
  updateMarketPills();
}

// Close pill submenus when clicking outside (desktop)
document.addEventListener('click', e => {
  if (!e.target.closest('.pill-group') && !e.target.closest('#mobile-city-bar')) {
    _closePillMenus(null);
    ALL_COUNTRIES.forEach(c => { const ar = id(`arrow-${c}`); if (ar) ar.classList.remove('open'); });
  }
});

function updateMarketPills() {
  const active = id('country-select').value;
  ALL_COUNTRIES.forEach(c => {
    const pill = id(`pill-${c}`);
    if (pill) pill.classList.toggle('active', active === c);
  });
  // Desktop sub-item active states
  ALL_COUNTRIES.forEach(c => {
    (PILL_CITIES[c] || []).forEach(([, city]) => {
      const key = city.replace(/'/g,'').replace(/\s+/g,'');
      const el  = id(`subcity-${c}-${key}`) || id(`subcity-${c}-${city}`);
      if (el) el.classList.toggle('active', active === c && activePillCity === city);
    });
  });
  // Mobile city bar: refresh chips if visible
  if (_isMobile() && active && !id('mobile-city-bar').getAttribute('data-hidden')) {
    _showMobileCityBar(active);
  }
}

const USD_TO_EUR = 0.92;
let activeCurrency = localStorage.getItem('hc_currency') || 'USD';

const EUR_TO_USD = 1 / USD_TO_EUR;

function convertTo(p, sourceCurrency, targetCurrency) {
  if (p == null) return null;
  const src = (sourceCurrency || 'USD').toUpperCase();
  const tgt = (targetCurrency  || 'USD').toUpperCase();
  if (src === tgt) return p;
  return src === 'EUR' ? p * EUR_TO_USD : p * USD_TO_EUR;
}

function convertPrice(p, sourceCurrency) {
  return convertTo(p, sourceCurrency, activeCurrency);
}

function fmtPrice(p, sourceCurrency) {
  if (p == null) return '—';
  const v = convertPrice(p, sourceCurrency);
  const sym = activeCurrency === 'EUR' ? '€' : '$';
  return sym + Math.round(v).toLocaleString('en-US');
}

function setCurrency(c) {
  activeCurrency = c;
  localStorage.setItem('hc_currency', c);
  const lbl = id('max-price-currency-label');
  if (lbl) lbl.textContent = c;
  id('btn-usd').style.background = c === 'USD' ? '#3b82f6' : '#1e293b';
  id('btn-usd').style.color      = c === 'USD' ? '#fff'    : '#64748b';
  id('btn-eur').style.background = c === 'EUR' ? '#3b82f6' : '#1e293b';
  id('btn-eur').style.color      = c === 'EUR' ? '#fff'    : '#64748b';
  // Update prices in-place on every visible card (no full re-render = no flicker)
  filteredListings.forEach(l => {
    const curr = document.querySelector(`[data-idx="${l.id}"] .price-current`);
    const orig = document.querySelector(`[data-idx="${l.id}"] .price-original`);
    if (curr) curr.textContent = fmtPrice(l.price,     l.currency);
    if (orig) orig.textContent = fmtPrice(l.max_price, l.currency);
  });
  // Also fix chart Y axis if modal is closed
  if (!currentListing) {
    const ytick = document.querySelector('.price-current'); // just trigger repaint
    if (ytick) ytick.getBoundingClientRect();
  }
  // Refresh open modal (chart + prices)
  if (currentListing) openModal(currentListing);
}
function fmtDate(d) {
  return d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
}
function timeAgo(d) {
  const m = Math.floor((Date.now() - d.getTime()) / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let _dashLang = localStorage.getItem('hc_lang') || 'en';

function toggleDashLangMenu() {
  const menu = document.getElementById('dash-lang-menu');
  menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
}
document.addEventListener('click', e => {
  const sw = document.getElementById('dash-lang-switcher');
  if (sw && !sw.contains(e.target)) document.getElementById('dash-lang-menu').style.display = 'none';
});

function dashSetLang(lang) {
  _dashLang = lang;
  localStorage.setItem('hc_lang', lang);
  document.getElementById('dash-lang-menu').style.display = 'none';
  const flags = { en: '🇬🇧', pl: '🇵🇱', es: '🇪🇸' };
  const codes  = { en: 'EN',   pl: 'PL',   es: 'ES' };
  document.getElementById('dash-lang-flag').textContent = flags[lang];
  document.getElementById('dash-lang-code').textContent = codes[lang];
  applyDashTranslations();
  // Re-render listings to pick up translated strings
  renderListings(filteredListings);
  if (filteredListings.length > 0) {
    const t = DASH_T[lang] || DASH_T.en;
    id('result-count').textContent = t.listing_count(filteredListings.length, allListings.length);
  }
}

function applyDashTranslations() {
  const t = DASH_T[_dashLang] || DASH_T.en;

  // data-i18n text
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  // data-i18n-placeholder
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (t[key] !== undefined) el.placeholder = t[key];
  });

  // select options
  document.querySelectorAll('option[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.textContent = t[key];
  });
}

// Apply saved language on load
document.addEventListener('DOMContentLoaded', () => {
  if (_dashLang !== 'en') {
    const flags = { pl: '🇵🇱', es: '🇪🇸' };
    const codes  = { pl: 'PL',   es: 'ES' };
    document.getElementById('dash-lang-flag').textContent = flags[_dashLang] || '🇬🇧';
    document.getElementById('dash-lang-code').textContent = codes[_dashLang] || 'EN';
    applyDashTranslations();
  }
}, { once: false }); // runs alongside existing DOMContentLoaded
